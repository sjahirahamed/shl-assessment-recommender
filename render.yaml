services:
  - type: web
    name: shl-assessment-recommender
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Recruiter will provide their own API key in Render UI
